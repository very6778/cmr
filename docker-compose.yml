version: '3.8'

services:
  cmr:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        - NEXT_PUBLIC_API_KEY=${API_KEY}
    container_name: cmr-frontend
    restart: always
    # Host port binding kaldirildi. Traefik dokploy-network uzerinden erisir.
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://cmr-backend:5001
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - API_KEY=${API_KEY}
    depends_on:
      cmr-backend:
        condition: service_healthy
    networks:
      - cmr-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000', (r) => { process.exit(r.statusCode < 500 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTPS router
      - "traefik.http.routers.cmr-frontend.rule=Host(`yedek.opik.online`)"
      - "traefik.http.routers.cmr-frontend.entrypoints=websecure"
      - "traefik.http.routers.cmr-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.cmr-frontend.loadbalancer.server.port=3000"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.cmr-frontend-http.rule=Host(`yedek.opik.online`)"
      - "traefik.http.routers.cmr-frontend-http.entrypoints=web"
      - "traefik.http.routers.cmr-frontend-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      # Uzun PDF stream'leri icin buffer flush
      - "traefik.http.services.cmr-frontend.loadbalancer.responseforwarding.flushinterval=100ms"

  cmr-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cmr-backend
    restart: always
    # Backend dis dunyaya acilmaz, sadece cmr-network uzerinden frontend erisir.
    expose:
      - "5001"
    environment:
      - CORS_DOMAIN=${CORS_DOMAIN:-http://localhost:3000}
      - API_KEY=${API_KEY}
    volumes:
      - backend_outputs:/app/outputs
      - backend_logs:/app/logs
    networks:
      - cmr-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=8)"]
      # Uzun PDF islerinde false-positive olmamasi icin toleranslar gevsetildi.
      # 60s + 5 retry x 15s = yaklasik 135s healthy kalma toleransi.
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '7'
          memory: 12G
        reservations:
          cpus: '1'
          memory: 2G

  # Unhealthy container'lari otomatik yeniden baslat
  autoheal:
    image: willfarrell/autoheal
    container_name: cmr-autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  cmr-network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  backend_outputs:
  backend_logs:
